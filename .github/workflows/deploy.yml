# .github/workflows/deploy.yml

# 工作流程名稱
name: Build and Deploy Site

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 觸發條件
on:
  # 1. 當手動推送到 main 分支時 (例如您自己修改程式碼)
  push:
    branches:
      - main
  # 2. 當手動點擊執行時
  workflow_dispatch:
  # 3. 每 8 小時定時執行一次
  schedule:
    - cron: '0 */8 * * *'

# 工作流程執行的任務
jobs:
  build-and-deploy: # 將 job 名稱改得更貼切
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ✨ 需要 "寫入" 權限來 commit 資料
      pages: write      # 需要權限來部署到 Pages
      id-token: write   # 需要權限來進行身分驗證

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 步驟 1: 拉取您倉庫的程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步驟 2: 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 步驟 3: 安裝 Python 套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ==================== ✨ 新增的資料抓取區塊 ✨ ====================
      - name: Run all scrapers to update data
        run: |
          python scripts/scrape_research.py
          python scripts/scrape_eggs.py
          python scripts/scrape_boss.py
          python scripts/generate_pokemon_data.py
          python scripts/build_cp_sitemap.py   # 產生每隻寶可夢的 CP 深連結 sitemap
      # ================================================================

      # 步驟 4: 從 Secret 建立 config.js 檔案
      - name: Create config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JSON }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "const firebaseConfig = $FIREBASE_CONFIG;" > config.js
          echo "window.firebaseConfig = firebaseConfig;" >> config.js
          echo "window.MAPS_API_KEY = \"$MAPS_API_KEY\";" >> config.js

      # 步驟 5: 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 步驟 6: 將網站檔案 (包含剛抓到的新資料) 打包
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: '.'

      # 步驟 7: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      # ==================== ✨ 新增的資料回傳區塊 ✨ ====================
      # 這是個好習慣：將抓到的新資料也 commit 回你的倉庫，讓原始碼保持最新
      - name: Commit and push data changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 沒有變更就直接結束
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          # 遠端可能在這期間已被更新（你自己 push 或上一個排程 run），
          # 所以每次都把「最新遠端」當基底，再把這次產生的資料疊上去 → 一定能快轉 push。
          # 這次爬到的資料是最新的，讓它覆蓋遠端同名檔即可，不會有衝突。
          for i in 1 2 3; do
            git fetch origin main
            git reset --soft origin/main        # HEAD 移到最新遠端，保留已 add 的資料變更
            git add data/
            if git diff --staged --quiet; then
              echo "與最新遠端相比沒有差異，無需 push。"; exit 0
            fi
            git commit -m "chore(data): Auto-update Pokémon GO data"
            git push && exit 0
            echo "push 第 $i 次失敗，重新以最新遠端為基底再試…"
            sleep 5
          done
          echo "多次重試後仍無法 push"; exit 1
      # ================================================================

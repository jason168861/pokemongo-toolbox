<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寶可夢 GO 交易清單產生器</title>
<style>
  :root{--bg:#0f1220;--card:#1a1f36;--line:#2b3153;--fg:#eef0fb;--mut:#9aa3c7;--acc:#e0276c;--acc2:#7b5cff;--want:#2f9e57;--have:#c9a227;--cellbg:#0d1024}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:system-ui,"Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);background-attachment:fixed;color:var(--fg)}
  header{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0}.sub{color:var(--mut);font-size:12px}
  .wrap{display:grid;grid-template-columns:1fr 420px;gap:16px;padding:16px;align-items:start}
  @media(max-width:1020px){.wrap{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
  .tabs{display:flex;gap:8px;margin-bottom:10px}
  .tabs button{flex:1;background:var(--cellbg);border:1px solid var(--line);color:var(--fg);padding:8px;border-radius:8px;cursor:pointer;font:inherit}
  .tabs button.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border:0;font-weight:700;color:#fff}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
  input[type=text],input[type=number],select{background:var(--cellbg);border:1px solid var(--line);color:var(--fg);border-radius:8px;padding:8px 10px;font:inherit}
  .chip{font-size:12px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:6px 10px;cursor:pointer;user-select:none}
  .chip.on{background:var(--acc2);color:#fff;border-color:transparent}
  .fdiv{color:var(--mut);font-size:11px;margin-left:4px;padding-left:9px;border-left:1px solid var(--line);align-self:center}
  .chip.scope{border-style:dashed}
  .chip.scope.on{background:var(--acc);color:#fff;border-color:transparent;border-style:solid}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;max-height:66vh;overflow:auto}
  .cell{position:relative;background:var(--cellbg);border:1px solid var(--line);border-radius:9px;overflow:hidden;cursor:pointer}
  .cell::before{content:"";display:block;padding-top:100%}   /* 撐出正方形,不靠 aspect-ratio(iOS Safari 相容) */
  .cell:hover{border-color:var(--acc2);transform:translateY(-2px)}
  .cell.added{outline:2px solid var(--want);opacity:.55}
  .cell img.m{position:absolute;inset:0;margin:auto;width:88%;height:88%;object-fit:contain;z-index:2}
  .cell img.cbg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .cell .bd{position:absolute;right:2px;top:2px;width:32%;height:32%;object-fit:contain;z-index:3}
  .cell .sh{position:absolute;left:3px;top:2px;font-size:11px;z-index:3}
  .li .sh{position:absolute;left:4%;top:2%;font-size:12px;z-index:3}
  .cell .gn{position:absolute;left:3px;bottom:2px;font-size:12px;z-index:3;color:#ff9ec7;text-shadow:0 1px 2px #000}
  .cell .ok{position:absolute;right:3px;bottom:2px;z-index:4;font-size:12px;color:#7dffb0}
  .seg{display:flex;gap:6px;margin-bottom:8px}
  .seg button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--cellbg);color:var(--fg);cursor:pointer;font:inherit}
  .seg button.on{font-weight:700;border:0;color:#fff}
  .seg button.want.on{background:var(--want)} .seg button.have.on{background:var(--have)}
  .flyrow{display:flex;align-items:center;gap:8px;margin:6px 0 2px}
  /* 匯出選項開關 */
  .expopts{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 4px}
  .switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:13px;color:var(--fg);
          background:var(--cellbg);border:1px solid var(--line);border-radius:999px;padding:7px 14px 7px 10px;transition:border-color .15s,background .15s}
  .switch:hover{border-color:var(--acc2)}
  .switch input{position:absolute;opacity:0;width:0;height:0}
  .switch .track{flex:none;width:38px;height:21px;border-radius:999px;background:var(--line);position:relative;transition:background .18s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .18s}
  .switch input:checked ~ .track{background:var(--acc2)}
  .switch input:checked ~ .track::after{transform:translateX(17px)}
  .switch input:focus-visible ~ .track{outline:2px solid var(--acc);outline-offset:2px}
  .switch:has(input:checked){background:color-mix(in srgb,var(--acc2) 15%,var(--cellbg));border-color:var(--acc2)}
  .sec{margin-top:12px}.sec h3{margin:0 0 6px;font-size:13px}
  .sec.want h3{color:var(--want)} .sec.have h3{color:var(--have)}
  .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;min-height:40px}
  .li{position:relative;cursor:grab}.li.dragging{opacity:.35}
  .li.insb::before{content:'';position:absolute;left:-6px;top:0;bottom:0;width:4px;background:var(--acc2);border-radius:2px;z-index:6}
  .li.insa::after{content:'';position:absolute;right:-6px;top:0;bottom:0;width:4px;background:var(--acc2);border-radius:2px;z-index:6}
  .li .card{position:relative;border-radius:10px;overflow:hidden;background:var(--cellbg);border:1px solid var(--line)}
  .li .card::before{content:"";display:block;padding-top:100%}
  .li .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .li .m{position:absolute;inset:0;margin:auto;width:80%;height:80%;object-fit:contain;z-index:2}
  .li .bd{position:absolute;right:5%;top:5%;width:28%;height:28%;z-index:3}
  .li .gn{position:absolute;left:4%;bottom:3%;z-index:3;font-size:11px;color:#ff9ec7;text-shadow:0 1px 2px #000}
  .li .del{position:absolute;right:2px;bottom:2px;z-index:4;width:18px;height:18px;padding:0;border-radius:50%;background:#000b;border:1px solid #fff5;color:#fff;cursor:pointer;font-size:11px;line-height:1}
  .empty{color:var(--mut);font-size:12px;padding:6px}
  .btn{padding:9px 12px;border:0;border-radius:8px;font:inherit;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
  .btn.g{background:var(--cellbg);border:1px solid var(--line);color:var(--fg);font-weight:400}
  .toolbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .themeSel{display:flex;align-items:center;gap:8px;margin-left:auto}
  .homelink{color:var(--fg);text-decoration:none;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:5px 10px;background:var(--cellbg)}
  .homelink:hover{border-color:var(--acc2)}
  #authBtn{font-size:12px;border:1px solid var(--line);border-radius:8px;padding:5px 10px;background:var(--cellbg);color:var(--fg);cursor:pointer}
  #authBtn:hover{border-color:var(--acc2)}
  #cloudMsg{font-size:11px;color:var(--mut)}
  /* 匯出編輯器 */
  #editor{position:relative;user-select:none;margin-top:8px}
  #baseCv{width:100%;display:block;border-radius:12px}
  #txtLayer{position:absolute;inset:0}
  .txt{position:absolute;cursor:grab;white-space:nowrap;line-height:1;touch-action:none;font-family:"Arial Black","Microsoft JhengHei",sans-serif}
  .txt.sel{outline:1.5px dashed #fff;outline-offset:4px;cursor:grabbing}
  .txtctl{display:none;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .txtctl input[type=text]{flex:1 1 100%;min-width:100%;font-size:14px}
  .txtctl input[type=color]{width:36px;min-width:36px;height:34px;padding:2px;border-radius:8px;border:1px solid var(--line);background:var(--cellbg)}
  .txtctl input[type=number]{width:64px;min-width:64px}
  .hint{color:var(--mut);font-size:11px;margin-top:6px}
  #backBtn{display:none}
  body.editmode #selPanel,body.editmode #listPanel{display:none}
  body.editmode #backBtn{display:inline-block}
  body.editmode .wrap{grid-template-columns:1fr;max-width:900px;margin:0 auto}
</style>
</head>
<body>
<header>
  <a class="homelink" href="../" id="homeLink">🧰 <span id="homeTxt">工具箱</span></a>
  <select id="toolJump" class="homelink" onchange="if(this.value){location.href='../?tab='+this.value}">
    <option value="">🔀 前往其他工具…</option>
    <option value="cp-checker-app">IV100 CP 查詢</option>
    <option value="pvp-ranker-app">PvP IV 排名查詢</option>
    <option value="id-selector-app">寶可夢編號篩選器</option>
    <option value="search-filters-app">搜尋篩選指令</option>
    <option value="raids-app">團體戰列表</option>
    <option value="eggs-app">孵蛋列表</option>
    <option value="research-app">田野調查任務</option>
    <option value="special-research-app">特殊調查</option>
    <option value="info-hub-app">特別資訊</option>
    <option value="map-app">補給站/道館地圖</option>
  </select>
  <h1 id="appTitle">🔴 寶可夢 GO 交易清單產生器</h1>

  <span class="themeSel">
    <span style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
      <button id="authBtn">以 Google 登入</button>
      <span id="cloudMsg"></span>
    </span>
    <span class="sub">🌐</span><select id="langSel"></select>
    <span class="sub" id="themeLabel">風格</span>
    <select id="themeSel"><option value="neon">深色霓虹</option><option value="warm">暖色活潑</option><option value="light">乾淨簡約</option></select>
  </span>
</header>

<div class="wrap">
  <div class="panel" id="selPanel" style="margin-bottom:0">
    <div class="tabs">
      <button id="tMon" class="on" onclick="setTab('mon')">寶可夢（全組合）</button>
      <button id="tBg" onclick="setTab('bg')">背卡組合</button>
    </div>
    <div class="filters" id="monFilters">
      <span style="position:relative;flex:1;min-width:160px;display:inline-flex">

        <button id="qClear" type="button" title="清除" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--mut);font-size:15px;cursor:pointer;padding:2px 7px;display:none">✕</button>
      </span>
      <span class="chip on" id="fNormal" onclick="tog('fNormal')">一般</span>
      <span class="chip on" id="fShiny" onclick="tog('fShiny')">✨ 異色</span>
      <span class="chip on" id="fDmax" onclick="tog('fDmax')">極巨化</span>
      <span class="chip on" id="fGmax" onclick="tog('fGmax')">超極巨化</span>
      <span class="chip on" id="fCos" onclick="tog('fCos')">造形/服裝</span>
      <span class="fdiv" id="fdiv">只看▸</span>
      <span class="chip scope" id="fSelected" onclick="tog('fSelected')">✓ 已選</span>
      <span class="chip scope" id="fLego" onclick="tog('fLego')">👑 傳說</span>
    </div>
    <div id="grid" class="grid"></div>
    <div class="sub" id="gcount" style="margin-top:8px"></div>
  </div>

  <div>
    <div class="panel" id="listPanel">
      <div class="seg">
        <button class="want on" id="segWant" onclick="setTarget('want')">加到「我想要的」</button>
        <button class="have" id="segHave" onclick="setTarget('have')">加到「我能提供的」</button>
      </div>
      <div class="sec want"><h3><span id="labWant">🟢 我想要的</span> <span class="sub" id="cW">0</span></h3><div class="list" id="listW"><div class="empty">點左邊縮圖加入</div></div></div>
      <div class="sec have"><h3><span id="labHave">🟡 我能提供的</span> <span class="sub" id="cH">0</span></h3><div class="list" id="listH"><div class="empty">點左邊縮圖加入</div></div></div>
      <div class="toolbar">
        <button class="btn" id="startBtn" onclick="setMode('edit')">🎨 我選好了，開始製圖</button>
        <button class="btn g" id="sortBtn">↕ 依編號排序</button>
        <button class="btn g" id="clr">清空清單</button>
      </div>
    </div>

    <div class="panel" id="editPanel">
      <button class="btn g" id="backBtn" onclick="setMode('select')" style="margin-bottom:10px">← 返回選擇</button>
      <strong id="editTitle">匯出圖（直接拖曳/編輯文字）</strong>
      <div class="expopts">
        <label class="switch"><input type="checkbox" id="canfly"><span class="track"></span><span id="canflyLabel">✈ 我能飛（顯示 CAN FLY）</span></label>
        <label class="switch"><input type="checkbox" id="qrOn" checked><span class="track"></span><span id="qrLabel">📷 在圖片加上推廣 QR</span></label>
      </div>
      <div id="editor"><canvas id="baseCv"></canvas><div id="txtLayer"></div></div>
      <div class="hint" id="editHint">點文字可選取 → 拖曳移動、下方改字/色/大小。</div>
      <div class="txtctl" id="txtctl">
        <input type="text" id="ctlText" placeholder="文字內容">
        <input type="color" id="ctlColor" title="顏色">
        <input type="number" id="ctlSize" min="10" max="120" title="大小">
        <select id="ctlFont" title="字體"></select>
        <select id="ctlWeight" title="粗細"></select>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--mut)"><input type="checkbox" id="ctlOutline"><span id="ctlOutlineLabel">外框</span></label>
        <button class="btn g" id="ctlDel">刪除</button>
      </div>
      <div class="toolbar">
        <button class="btn g" id="txtAdd">＋ 新增文字</button>
        <button class="btn g" id="txtReset">↺ 復原預設文字</button>
      </div>
      <div class="toolbar">
        <button class="btn" id="dl">⬇ 下載 PNG</button>
      </div>
    </div>
  </div>
</div>

async function loadNames(lang){ try{const r=await fetch('data/names/'+lang+'.json');if(r.ok)return await r.json();}catch(e){} return {}; }

  const maps=await Promise.all(LANGS.map(([c])=>loadNames(c)));
  const idx={};
  for(const m of maps) for(const dex in m){ (idx[dex]=idx[dex]||[]).push(m[dex]); }
  ALLNAMES={}; for(const dex in idx) ALLNAMES[dex]=idx[dex].join('|').toLowerCase();
}
function matchName(dex,q){ return (ALLNAMES[dex]||'').includes(q); }

  return fetch('data/'+name+'.json').then(r=>r.json());

  buildThumbs();

  window.addEventListener('resize',layoutTexts);

  try{ const s=localStorage.getItem(LS_KEY); if(s){ const d=JSON.parse(s);
    LIST={want:Array.isArray(d.want)?d.want:[],have:Array.isArray(d.have)?d.have:[]};
    for(const k of ['want','have']) for(const c of LIST[k]) c.zh=nameOf(c.dex);
    if(d.canfly && $('#canfly')) $('#canfly').checked=true;
    if($('#qrOn')) $('#qrOn').checked=(d.qr!==false); } }catch(e){}
  ready=true; bootResolve();

function applyTheme(k){
  if(!THEMES[k])k='neon'; THEME=k; $('#themeSel').value=k;
  const u=THEMES[k].ui,R=document.documentElement.style;
  const map={'--bg':u.bg,'--card':u.card,'--line':u.line,'--fg':u.fg,'--mut':u.mut,'--acc':u.acc,'--acc2':u.acc2,'--want':u.want,'--have':u.have,'--cellbg':u.cellbg};
  for(const p in map) R.setProperty(p,map[p]);
  localStorage.setItem('bgtoolTheme',k);
  // 主題色套到「未被手動改色」的預設文字
  const T=THEMES[k].exp;
  for(const t of TEXTS){ if(t.autoColor){ if(t.id==='title')t.color=T.title; else if(t.id==='canfly')t.color=T.fly; else if(t.id==='lab-want')t.color=T.sec1; else if(t.id==='lab-have')t.color=T.sec2; else if(t.id==='foot')t.color=T.foot; } }
  renderBase();
}

function setMode(m){
  if(m==='edit' && !LIST.want.length && !LIST.have.length){ alert(tr('edit_empty')); return; }
  document.body.classList.toggle('editmode', m==='edit');
  requestAnimationFrame(()=>renderBase());   // 版面寬度變了,重新排版
}
/* ---------- 版面計算(卡片固定,文字浮動) ---------- */
const LAYW=1000,PAD=40,S=132,GAP=16,COLS=6;
function rowsOf(n){return Math.max(1,Math.ceil(n/COLS));}
function computeLayout(){
  const fly=$('#canfly').checked;
  const secs=[{key:'want',items:LIST.want,col:THEMES[THEME].exp.sec1,def:'🟢 '+tr('want')},
              {key:'have',items:LIST.have,col:THEMES[THEME].exp.sec2,def:'🟡 '+tr('have')}].filter(s=>s.items.length);
  let top=140+(fly?42:0);
  let y=top; const S2=[];
  for(const s of secs){ const ph=rowsOf(s.items.length)*(S+GAP)+GAP; S2.push({...s,labelY:y,panelY:y+46,ph}); y=y+46+ph+28; }
  const qr=$('#qrOn')&&$('#qrOn').checked;
  const H=Math.max(y+(qr?116:50),240);
  return {fly,secs:S2,H,top,qr};
}
function defaultTexts(lay){
  const T=THEMES[THEME].exp,list=[];
  list.push({id:'title',text:'POKÉMON TRADE',align:'center',cx:LAYW/2,y:34,size:54,color:T.title,weight:900,font:DEFONT,outline:false,autoColor:true});
  if(lay.fly) list.push({id:'canfly',text:'✈ CAN FLY',align:'center',cx:LAYW/2,y:112,size:26,color:T.fly,weight:900,font:DEFONT,outline:false,autoColor:true});
  for(const s of lay.secs) list.push({id:'lab-'+s.key,text:s.def,align:'left',cx:PAD,y:s.labelY,size:28,color:s.col,weight:900,font:DEFONT,outline:false,autoColor:true});
  list.push({id:'foot',text:tr('export_foot'),align:'center',cx:LAYW/2,y:lay.H-40,size:22,color:T.foot,weight:700,font:DEFONT,outline:false,autoColor:true});
  return list;
}
function reconcile(lay){
  if(!TEXTS.length){ TEXTS=defaultTexts(lay); return; }
  const byId=id=>TEXTS.find(t=>t.id===id);
  const def=defaultTexts(lay);
  // 標題/頁尾 一定存在
  for(const id of ['title','foot']){ if(!byId(id)) TEXTS.push(def.find(d=>d.id===id)); }
  // canfly 依開關
  if(lay.fly && !byId('canfly')) TEXTS.push(def.find(d=>d.id==='canfly'));
  if(!lay.fly) TEXTS=TEXTS.filter(t=>t.id!=='canfly');
  // 區塊標籤:有該區才有,沒手動移動就跟著版面
  for(const key of ['want','have']){
    const has=lay.secs.some(s=>s.key===key);
    let el=byId('lab-'+key);
    if(has && !el){ TEXTS.push(def.find(d=>d.id==='lab-'+key)); }

/* ---------- 畫底圖(漸層+面板+卡片,不含文字) ---------- */
const _imgCache=new Map();   // url→Promise<Image|null>,避免每次匯出都重新下載/解碼
function loadImg(s){
  if(!s) return Promise.resolve(null);
  const key=cdn(s);
  if(_imgCache.has(key)) return _imgCache.get(key);
  const p=new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.referrerPolicy='no-referrer';
    i.onload=()=>r(i); i.onerror=()=>{_imgCache.delete(key);r(null);}; i.src=key;});
  _imgCache.set(key,p); return p;
}
// 匯出用中尺寸背卡縮圖(~384px webp,原圖背卡動輒 500KB+);縮圖缺失時自動退回原圖
function expOf(u){ return (u&&u.startsWith('assets/bg/')) ? 'assets/bgexp/'+u.slice(10).replace(/\.(png|jpe?g|webp)$/i,'.webp') : u; }
function loadExport(u){ const e=expOf(u); if(e===u) return loadImg(u); return loadImg(e).then(im=>im||loadImg(u)); }
let _qrImg;   // 推廣 QR(固定圖,載一次快取)
async function qrImg(){ if(_qrImg!==undefined) return _qrImg; _qrImg=await loadImg('assets/brand/qr.png'); return _qrImg; }
// 網格/清單用小縮圖(WebP)加速;匯出仍用原圖高解析。皆走 cdn()。
function thumbOf(u){ if(!u)return u;
  if(u.startsWith('assets/img/'))return cdn('assets/thumb/'+u.slice(11).replace(/\.png$/i,'.webp'));
  if(u.startsWith('assets/bg/'))return cdn('assets/bgthumb/'+u.slice(10).replace(/\.(png|jpe?g|webp)$/i,'.webp'));
  return u; }
function rrPath(x,rx,ry,w,h,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+w,ry,rx+w,ry+h,r);x.arcTo(rx+w,ry+h,rx,ry+h,r);x.arcTo(rx,ry+h,rx,ry,r);x.arcTo(rx,ry,rx+w,ry,r);x.closePath();}
function star(x,cx,cy,r,fill){x.beginPath();for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,rr_=i%2?r*0.45:r;x[i?'lineTo':'moveTo'](cx+rr_*Math.cos(a),cy+rr_*Math.sin(a));}x.closePath();x.fillStyle=fill;x.fill();}
async function drawCard(x,cx,cy,c,T){
  x.save();x.shadowColor='rgba(0,0,0,0.35)';x.shadowBlur=8;x.shadowOffsetY=3;x.fillStyle=T.cardbg;rrPath(x,cx,cy,S,S,S*0.16);x.fill();x.restore();
  x.save();rrPath(x,cx,cy,S,S,S*0.16);x.clip();x.fillStyle=T.cardbg;x.fillRect(cx,cy,S,S);
  if(c.bg){const b=await loadExport(c.bg);if(b)x.drawImage(b,cx,cy,S,S);}
  const m=await loadImg(c.url);if(m)x.drawImage(m,cx+S*0.09,cy+S*0.09,S*0.82,S*0.82);
  x.restore();
  if(T.line&&!/,\s*0\)$/.test(T.line)){x.strokeStyle=T.line;x.lineWidth=2;rrPath(x,cx,cy,S,S,S*0.16);x.stroke();}
  if(c.badge){const b=await loadImg(c.badge);if(b)x.drawImage(b,cx+S*0.63,cy+S*0.04,S*0.33,S*0.33);}
  if(c.shiny){x.textAlign='left';x.font=Math.round(S*0.2)+'px "Segoe UI Emoji","Microsoft JhengHei"';x.fillText('✨',cx+S*0.04,cy+S*0.24);}
  if(c.gender==='female'||c.gender==='male'){x.fillStyle=c.gender==='female'?'#ff8ec2':'#8fc7ff';x.font='700 '+Math.round(S*0.16)+'px "Microsoft JhengHei",sans-serif';x.fillText(c.gender==='female'?'♀':'♂',cx+S*0.05,cy+S*0.95);}
}
async function drawBaseTo(x,lay,SC){
  const T=THEMES[THEME].exp,W=LAYW,H=lay.H;
  x.setTransform(SC,0,0,SC,0,0);
  const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,T.grad[0]);g.addColorStop(1,T.grad[1]);x.fillStyle=g;x.fillRect(0,0,W,H);
  // 先平行啟動本次要用的所有圖片下載(填入快取);下面的 draw 迴圈再逐張命中 → 平行載入、漸進顯示,不再一張等一張
  for(const s of lay.secs) for(const c of s.items){ loadImg(c.url); if(c.bg)loadExport(c.bg); if(c.badge)loadImg(c.badge); }
  if(lay.qr) qrImg();
  for(const s of lay.secs){
    x.fillStyle=T.panel;rrPath(x,PAD,s.panelY,W-2*PAD,s.ph,24);x.fill();
    for(let i=0;i<s.items.length;i++){await drawCard(x,PAD+GAP+(i%COLS)*(S+GAP),s.panelY+GAP+((i/COLS)|0)*(S+GAP),s.items[i],T);}
  }
  // 推廣 QR(右下角,白底圓角確保深色主題也掃得到;提示文字在其上方靠右)
  if(lay.qr){
    const q=await qrImg();
    if(q){
      const qs=84, qx=W-PAD-qs, qy=H-qs-20;
      x.save();

      x.fillStyle='#fff';rrPath(x,qx-7,qy-7,qs+14,qs+14,12);x.fill();
      x.restore();
      x.drawImage(q,qx,qy,qs,qs);
      x.save();x.fillStyle=T.foot;x.textAlign='right';x.textBaseline='alphabetic';
      x.font='700 15px '+DEFONT; x.fillText(tr('scan_hint'), qx+qs, qy-9);

    }
  }
}

let drag=null;
function startDrag(e,t,d,sc){
  e.preventDefault();

  drag={t,sc,px:e.clientX,py:e.clientY,cx0:t.cx,y0:t.y};

    x.fillStyle=t.color;x.fillText(t.text,px,py);

async function saveCanvas(cv, name){
  // 保留 Safari 原本的「下載 / 檢視」選單,只把 data URL 換成 Blob URL
  // (原本「檢視」沒反應是因為 2x 解析度的 data URL 太長,Safari 開不了;blob: 是短參照就正常)
  const blob = await new Promise(res=>{ if(cv.toBlob) cv.toBlob(res,'image/png'); else res(null); });
  if(blob){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 120000);   // 留時間給「檢視/下載」使用,之後才釋放
    return;
  }
  const a=document.createElement('a'); a.download=name; a.href=cv.toDataURL('image/png'); a.click();   // 舊瀏覽器後備
}

/* ---------- 以下為既有邏輯(縮圖/清單) ---------- */
function baseVar(p,shiny){return p.variants.find(v=>!!v.shiny===shiny&&!v.form&&!v.costume&&!v.gender)||p.variants.find(v=>!!v.shiny===shiny)||null;}
function buildThumbs(){
  THUMBS=[];BGCOMBOS=[];
  for(const p of Object.values(POKE)){
    for(const v of p.variants) THUMBS.push({url:v.url,dex:p.id,zh:nameOf(p.id),shiny:v.shiny,gender:v.gender,badge:null,tag:'',cos:!!(v.form||v.costume)});
    if(p.gigantamax){
      if(p.gigantamax.normal)THUMBS.push({url:p.gigantamax.normal,dex:p.id,zh:nameOf(p.id),shiny:false,badge:badgeG,tag:'超極巨化',gmax:true});
      if(p.gigantamax.shiny)THUMBS.push({url:p.gigantamax.shiny,dex:p.id,zh:nameOf(p.id),shiny:true,badge:badgeG,tag:'超極巨化',gmax:true});
    }
    if(p.dynamax_capable){
      const n=baseVar(p,false),s=baseVar(p,true);
      if(n)THUMBS.push({url:n.url,dex:p.id,zh:nameOf(p.id),shiny:false,badge:badgeD,tag:'極巨化',dmax:true});
      if(s)THUMBS.push({url:s.url,dex:p.id,zh:nameOf(p.id),shiny:true,badge:badgeD,tag:'極巨化',dmax:true});
    }
  }
  for(const b of BG){
    if(!b.image_url)continue;
    for(const mon of b.pokemon){
      const dex=mon.dex, p=POKE[dex]; if(!p)continue;
      const vn=baseVar(p,false), vs=baseVar(p,true);
      const add=(url,shiny,badge,tag,gm)=>{ if(url)BGCOMBOS.push({url,bg:b.image_url,dex,zh:nameOf(p.id),bgname:b.image_name,badge:badge||null,shiny:!!shiny,tag:tag||'',dmax:tag==='極巨化',gmax:!!gm,purified:tag==='淨化'}); };
      if(mon.gmax){ if(p.gigantamax){ add(p.gigantamax.normal,false,badgeG,'超極巨化',true); if(mon.shiny) add(p.gigantamax.shiny,true,badgeG,'超極巨化',true);} }
      else if(mon.dynamax){ add(vn&&vn.url,false,badgeD,'極巨化'); if(mon.shiny) add(vs&&vs.url,true,badgeD,'極巨化'); }
      else if(mon.shadow){ add(vn&&vn.url,false,badgeP,'淨化'); if(mon.shiny) add(vs&&vs.url,true,badgeP,'淨化'); }
      else { add(vn&&vn.url,false,null,''); if(mon.shiny) add(vs&&vs.url,true,null,''); }
    }
  }
  for(const t of THUMBS) t.legendary=!!(POKE[t.dex]&&POKE[t.dex].legendary);
  for(const c of BGCOMBOS) c.legendary=!!(POKE[c.dex]&&POKE[c.dex].legendary);
}
function setTab(t){TAB=t;$('#tMon').classList.toggle('on',t==='mon');$('#tBg').classList.toggle('on',t==='bg');

function tog(id){FILT[id]=!FILT[id];$('#'+id).classList.toggle('on',FILT[id]);render();}
function setTarget(t){TARGET=t;$('#segWant').classList.toggle('on',t==='want');$('#segHave').classList.toggle('on',t==='have');
  $('#fSelected').textContent='✓ '+tr('f_sel')+'：'+(t==='want'?tr('want'):tr('have'));
  if(FILT.fSelected)render(); else refreshAdded();}   // 只在「已選」篩選開啟時才需重建;否則原地更新✓
function refreshAdded(){

let shown=0,FILTERED=[];
function keyOf(c){return (c.url||'')+'|'+(c.bg||'')+'|'+(c.badge||'');}
function inTarget(c){return LIST[TARGET].some(x=>keyOf(x)===keyOf(c));}

// 只預載「已渲染之後的接下來一段」(不是全部),首屏最快,滾動時再往前補
const AHEAD=360;                          // 預先暖快取的張數(約接下來幾屏)
let preloadToken=0;
function preloadAhead(){
  const my=++preloadToken;                // 換篩選/滾動就取消上一輪
  const start=shown, end=Math.min(shown+AHEAD, FILTERED.length);
  const urls=[]; for(let k=start;k<end;k++){ const it=FILTERED[k]; if(!it)continue; urls.push(thumbOf(it.url)); if(it.bg)urls.push(thumbOf(it.bg)); }
  let i=0, active=0; const MAX=6;
  function pump(){
    if(my!==preloadToken) return;
    while(active<MAX && i<urls.length){
      const u=urls[i++]; if(!u)continue;
      active++; const im=new Image(); im.referrerPolicy='no-referrer';
      im.onload=im.onerror=()=>{ active--; if(my===preloadToken) pump(); };
      im.src=u;
    }
  }
  pump();
}
function appendBatch(){
  const g=$('#grid');const end=Math.min(shown+300,FILTERED.length);
  for(let i=shown;i<end;i++){
    const it=FILTERED[i];const d=document.createElement('div');d.className='cell';
    if(inTarget(it))d.classList.add('added');
    d.innerHTML=`${it.bg?`<img class="cbg" loading="lazy" decoding="async" referrerpolicy="no-referrer" src="${thumbOf(it.bg)}">`:''}
      <img class="m" loading="lazy" decoding="async" src="${thumbOf(it.url)}">${it.badge?`<img class="bd" src="${cdn(it.badge)}">`:''}
      ${it.shiny?'<span class="sh">✨</span>':''}${it.gender==='female'?'<span class="gn">♀</span>':''}${it.gender==='male'?'<span class="gn" style="color:#8fc7ff">♂</span>':''}${inTarget(it)?'<span class="ok">✓</span>':''}`;
    d.title=(it.zh||'')+(it.tag?'('+it.tag+')':'')+(it.bgname?' + '+it.bgname:'')+(it.shiny?' 異色':'');
    d._it=it;   // 存參照,切換目標時可原地更新✓而不必重建網格(避免圖片重載)
    d.onclick=()=>toggleItem(it,d);
    g.appendChild(d);
  }
  shown=end;
  preloadAhead();   // 暖快取:接下來一段的縮圖
}
let LIST={want:[],have:[]};
let dragK=null,dragIdx=null;
function toggleItem(it,cell){
  const c={url:it.url,badge:it.badge||null,zh:it.zh,shiny:!!it.shiny,tag:it.tag||'',bg:it.bg||null,gender:it.gender||null,dex:it.dex};

  else{arr.push(c);if(cell){cell.classList.add('added');if(!cell.querySelector('.ok')){const s=document.createElement('span');s.className='ok';s.textContent='✓';cell.appendChild(s);}}
    loadImg(c.url); if(c.bg)loadExport(c.bg); if(c.badge)loadImg(c.badge);}   // 加入時就先把匯出用圖抓進快取,之後製圖免等

}

function moveItem(k,from,to){const arr=LIST[k];const[mv]=arr.splice(from,1);if(to>from)to--;arr.splice(to,0,mv);drawLists();renderBase();}
function drawLists(){

        ${c.shiny?'<span class="sh">✨</span>':''}${c.gender==='female'?'<span class="gn">♀</span>':''}${c.gender==='male'?'<span class="gn" style="color:#8fc7ff">♂</span>':''}</div>

      d.querySelector('.del').onclick=e=>{e.stopPropagation();LIST[k].splice(i,1);drawLists();render();renderBase();};
      d.ondragstart=e=>{dragK=k;dragIdx=i;d.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
      d.ondragend=()=>{d.classList.remove('dragging');clearIns();dragK=null;dragIdx=null;};
      d.ondragover=e=>{ if(dragK!==k)return; e.preventDefault();
        const r=d.getBoundingClientRect(),after=(e.clientX-r.left)>r.width/2;
        clearIns(); d.classList.add(after?'insa':'insb'); };
      d.ondrop=e=>{ if(dragK!==k||dragIdx==null)return; e.preventDefault();e.stopPropagation();clearIns();
        const r=d.getBoundingClientRect(),after=(e.clientX-r.left)>r.width/2;
        moveItem(k,dragIdx,after?i+1:i); };
      box.appendChild(d);});
  }
  persist();
}

/* ===== 清單記錄:登入→雲端(Firebase Realtime DB),未登入→localStorage ===== */
const LS_KEY='tradeListData';
let AUTHUSER=null, cloudUid=null, cloudSave=null, ready=false, saveTimer=null;
let bootResolve; const bootReady=new Promise(r=>{bootResolve=r;});   // boot 完成(本機清單已還原)後 resolve
function collect(){ return {v:1, want:LIST.want, have:LIST.have, canfly:$('#canfly')?$('#canfly').checked:false, qr:$('#qrOn')?$('#qrOn').checked:true}; }
function persist(){
  if(!ready) return;
  const data=collect();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(data)); }catch(e){}
  if(cloudUid && cloudSave){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>cloudSave(data), 700); }
}
function applyData(d){
  if(!d) return;
  LIST={want:Array.isArray(d.want)?d.want:[], have:Array.isArray(d.have)?d.have:[]};
  for(const k of ['want','have']) for(const c of LIST[k]) c.zh=nameOf(c.dex);   // 名稱依目前語言重算
  if($('#canfly')){ $('#canfly').checked=!!d.canfly; TEXTS=TEXTS.filter(t=>t.id!=='canfly'); }
  if($('#qrOn')) $('#qrOn').checked=(d.qr!==false);   // 預設開啟,僅明確關過才關
  drawLists(); render(); renderBase();
}
function updateAuthUI(user){
  AUTHUSER=user; const b=$('#authBtn'), m=$('#cloudMsg'); if(!b) return;
  if(user){ b.textContent=tr('auth_logout'); b.onclick=()=>window.__tlAuth&&window.__tlAuth.signOut();
    if(m) m.textContent=(user.displayName||user.email||'')+' · '+tr('auth_synced'); }
  else{ b.textContent=tr('auth_login'); b.onclick=()=>window.__tlAuth&&window.__tlAuth.signIn();
    if(m) m.textContent=tr('auth_guest'); }
}
// 給 Firebase 模組(另一支 type=module 腳本)呼叫的橋接
window.__TL={
  applyData, collect, updateAuthUI, ready:bootReady,
  setCloudSave(fn){ cloudSave=fn; },
  setCloudUid(u){ cloudUid=u; if(u) persist(); }   // 登入後把目前清單立即同步一次
};
boot();
</script>

<!-- Firebase 登入 + 雲端清單同步(沿用主站 config.js / Realtime Database)。ES module,透過 window.__TL 與上面的主腳本溝通。 -->
<script src="../config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
  const TL = () => window.__TL;
  if(window.firebaseConfig){
    const app = initializeApp(window.firebaseConfig);
    const auth = getAuth(app), db = getDatabase(app), provider = new GoogleAuthProvider();
    const path = uid => `users/${uid}/tradeList`;
    // 提供給主腳本按鈕使用的登入/登出
    window.__tlAuth = {
      signIn(){ signInWithPopup(auth, provider).catch(e=>{ console.error(e); alert('登入失敗:'+(e.message||e)); }); },
      signOut(){ signOut(auth); }
    };
    // 雲端存檔器交給主腳本(每次清單變動且已登入時會呼叫)
    const saver = async (data) => { const u = auth.currentUser; if(!u) return;
      try{ await set(ref(db, path(u.uid)), data); }catch(e){ console.error('雲端儲存失敗', e); } };
    if(TL()) TL().setCloudSave(saver);
    onAuthStateChanged(auth, async (user) => {
      const tl = TL(); if(!tl) return;
      await tl.ready;                                   // 等 boot 完成、本機清單已還原,雲端才覆蓋
      tl.updateAuthUI(user);
      if(user){
        try{
          const snap = await get(ref(db, path(user.uid)));
          if(snap.exists()) tl.applyData(snap.val());   // 雲端有→覆蓋本機顯示
          else saver(tl.collect());                     // 雲端還沒有→把目前本機清單上傳
        }catch(e){ console.error('讀取雲端清單失敗', e); }
        tl.setCloudUid(user.uid);                        // 之後的變動都寫雲端
      }else{
        tl.setCloudUid(null);
      }
    });
  }else{
    console.warn('找不到 window.firebaseConfig,交易清單的登入/雲端同步已停用(本機暫存仍可用)。');
  }
</script>
</body>

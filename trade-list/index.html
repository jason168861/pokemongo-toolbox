<style>
  :root{--bg:#0f1220;--card:#1a1f36;--line:#2b3153;--fg:#eef0fb;--mut:#9aa3c7;--acc:#e0276c;--acc2:#7b5cff;--want:#2f9e57;--have:#c9a227;--cellbg:#0d1024}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:system-ui,"Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);background-attachment:fixed;color:var(--fg)}
  header{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0}.sub{color:var(--mut);font-size:12px}

  #selPanel{position:fixed;top:10px;bottom:10px;left:50%;transform:translateX(-50%);

  /* touch-action:pan-y → 只允許上下捲動,停用夾捏縮放,讓兩指可同時各點選一隻(不會被當成縮放手勢) */
  #selPanel #gridWrap{flex:1 1 auto;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
  #selPanel #grid{max-height:none;overflow:visible}
  /* 電腦版:選取面板更寬、圖片更大(每排數量不變) */
  @media(min-width:900px){

  }
  body.picking{overflow:hidden}
  body.picking #selPanel{display:flex}

  .pickHead b{font-size:15px}
  #pickClose{background:var(--acc2);color:#fff;border:0;font-weight:700}
  .secBtns{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}

           background:transparent;border-radius:999px;cursor:pointer;font-weight:700;white-space:nowrap}
  .editSec:hover{background:var(--acc2);color:#fff}

  .editSec.danger:hover{background:var(--acc);color:#fff}

  .tabs{display:flex;gap:8px;margin-bottom:10px}
  .tabs button{flex:1;background:var(--cellbg);border:1px solid var(--line);color:var(--fg);padding:8px;border-radius:8px;cursor:pointer;font:inherit}

  .chip{font-size:12px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:6px 10px;cursor:pointer;user-select:none}
  .chip.on{background:var(--acc2);color:#fff;border-color:transparent}

  }
  .chip.scope{border-style:dashed}

  .cell::before{content:"";display:block;padding-top:100%}   /* 撐出正方形,不靠 aspect-ratio(iOS Safari 相容) */

  .cell .sh{position:absolute;left:3px;top:2px;font-size:11px;z-index:3}
  .li .sh{position:absolute;left:4%;top:2%;font-size:12px;z-index:3}
  .cell .gn{position:absolute;left:3px;bottom:3px;font-size:12px;line-height:1;z-index:3;color:#ff9ec7;text-shadow:0 0 2px #000,0 1px 2px #000}

  .seg button.on{font-weight:700;border:0;color:#fff}
  .seg button.want.on{background:var(--want)} .seg button.have.on{background:var(--have)}
  .flyrow{display:flex;align-items:center;gap:8px;margin:6px 0 2px}
  /* 多組清單 */
  .setsHead{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}

  .setbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:28px}
  .setchip{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--cellbg);
           border-radius:999px;overflow:hidden;cursor:grab}
  .setchip:active{cursor:grabbing}
  .setchip.dragging{opacity:.4}
  .setchip.insb{box-shadow:-3px 0 0 var(--acc2)}
  .setchip.insa{box-shadow:3px 0 0 var(--acc2)}
  .setchip .nm{padding:5px 9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--fg);
               max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .setchip .ct{font-size:10px;color:var(--mut);padding-right:9px;font-weight:700}
  .setchip.on{background:var(--acc2);border-color:var(--acc2)}
  .setchip.on .nm{color:#fff}
  .setchip.on .ct{color:rgba(255,255,255,.85)}
  .setacts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .setacts .btn{padding:5px 9px;font-size:11px}
  /* 匯出選項開關 */
  .expopts{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 4px}
  .switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:13px;color:var(--fg);
          background:var(--cellbg);border:1px solid var(--line);border-radius:999px;padding:7px 14px 7px 10px;transition:border-color .15s,background .15s}
  .switch:hover{border-color:var(--acc2)}
  .switch input{position:absolute;opacity:0;width:0;height:0}
  .switch .track{flex:none;width:38px;height:21px;border-radius:999px;background:var(--line);position:relative;transition:background .18s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .18s}
  .switch input:checked ~ .track{background:var(--acc2)}
  .switch input:checked ~ .track::after{transform:translateX(17px)}
  .switch input:focus-visible ~ .track{outline:2px solid var(--acc);outline-offset:2px}
  .switch:has(input:checked){background:color-mix(in srgb,var(--acc2) 15%,var(--cellbg));border-color:var(--acc2)}
  .sec{margin-top:12px}.sec h3{margin:0 0 6px;font-size:13px;display:flex;align-items:center;gap:6px}
  .sec.want h3{color:var(--want)} .sec.have h3{color:var(--have)}
  /* 可收合的區塊標題 */

             font-size:11px;line-height:1;transition:transform .3s cubic-bezier(.4,0,.2,1),background .15s,border-color .15s}

  .secToggle:active{transform:scale(.9)}
  .secLab{cursor:pointer;user-select:none}
  .sec.collapsed .secToggle{transform:rotate(-90deg)}
  .sec.collapsed .secToggle:active{transform:rotate(-90deg) scale(.9)}
  /* 平滑展開/收合(grid 0fr↔1fr) */
  .secBody{display:grid;grid-template-rows:1fr;transition:grid-template-rows .32s cubic-bezier(.4,0,.2,1),opacity .25s ease}

  .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;min-height:40px}
  .li{position:relative;cursor:grab}.li.dragging{opacity:.35}
  .li.insb::before{content:'';position:absolute;left:-6px;top:0;bottom:0;width:4px;background:var(--acc2);border-radius:2px;z-index:6}
  .li.insa::after{content:'';position:absolute;right:-6px;top:0;bottom:0;width:4px;background:var(--acc2);border-radius:2px;z-index:6}
  .li,.li img,.li .card,.cell,.cell img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
.li .card{position:relative;border-radius:10px;overflow:hidden;background:var(--cellbg);border:1px solid var(--line)}
  .li .card::before{content:"";display:block;padding-top:100%}
  .li .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .li .m{position:absolute;inset:0;margin:auto;width:80%;height:80%;object-fit:contain;z-index:2}
  .li .m.big{width:94%;height:94%}   /* 無背卡:放大填滿,減少白邊 */
  .li .bd{position:absolute;right:5%;top:5%;width:28%;height:28%;z-index:3}
  .li .gn{position:absolute;left:5%;bottom:5%;z-index:3;font-size:12px;line-height:1;color:#ff9ec7}
  .li .card .del{position:absolute;right:2px;bottom:2px;z-index:4;width:18px;height:18px;padding:0;border-radius:50%;background:#000b;border:1px solid #fff5;color:#fff;cursor:pointer;font-size:11px;line-height:1}
  .li .note{display:block;width:100%;margin-top:3px;box-sizing:border-box;font-size:10px;padding:2px 4px;line-height:1.25;
            border:1px solid var(--line);border-radius:6px;background:var(--cellbg);color:var(--fg);text-align:center;cursor:text;
            resize:none;overflow:hidden;font-family:inherit;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
  .li .note::placeholder{color:var(--mut);opacity:.7}
  .li .note:focus{outline:1px solid var(--acc2);border-color:var(--acc2)}
  .li .note.has{border-color:var(--acc2);color:var(--acc2);font-weight:700}
  .empty{color:var(--mut);font-size:12px;padding:6px}
  .btn{padding:9px 12px;border:0;border-radius:8px;font:inherit;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
  .btn.g{background:var(--cellbg);border:1px solid var(--line);color:var(--fg);font-weight:400}
  .toolbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .themeSel{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
  /* 登入按鈕放在工具選單右側;隱藏「956 隻」統計文字 */
  #stat{display:none}

let LANG='zh',NAMES={};
function tr(k){return (I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k;}
// 首次造訪:依瀏覽器語言挑支援的語系(國外訪客不會一進來就是中文);老訪客仍用存過的選擇
function detectLang(){
  for(const l of (navigator.languages||[navigator.language||''])){
    const c=String(l).toLowerCase();
    if(c.startsWith('zh')) return 'zh';
    if(I18N[c.slice(0,2)]) return c.slice(0,2);
  }
  return 'zh';
}
// ?lang= 獨立網址 + hreflang:每個語言變體有自己的網址與自我參照 canonical
const HREFLANG={zh:'zh-Hant',en:'en',ja:'ja',ko:'ko',fr:'fr',de:'de',es:'es'};
const BASEURL='https://jason168861.github.io/pokemongo-toolbox/trade-list/';
function syncLangMeta(lang, isVariant){
  document.documentElement.lang=HREFLANG[lang]||'en';
  const c=document.getElementById('canonicalLink');
  if(c) c.href = isVariant ? BASEURL+'?lang='+lang : BASEURL;   // 變體自我參照,基底=x-default
}
function nameOf(dex){return NAMES[dex]||(POKE[dex]&&POKE[dex].zh)||('#'+dex);}
async function loadNames(lang){ try{const r=await fetch('data/names/'+lang+'.json');if(r.ok)return await r.json();}catch(e){} return {}; }
let ALLNAMES={};   // dex -> 所有語言名稱串接(小寫),供跨語言搜尋
async function loadAllNames(){
  const maps=await Promise.all(LANGS.map(([c])=>loadNames(c)));
  const idx={};
  for(const m of maps) for(const dex in m){ (idx[dex]=idx[dex]||[]).push(m[dex]); }
  ALLNAMES={}; for(const dex in idx) ALLNAMES[dex]=idx[dex].join('|').toLowerCase();
}
function matchName(dex,q){ return (ALLNAMES[dex]||'').includes(q); }
async function applyLang(lang){
  if(!I18N[lang])lang='en'; LANG=lang; localStorage.setItem('bgtoolLang',lang);
  syncLangMeta(lang, true); $('#langSel').value=lang;
  try{ const u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState(null,'',u); }catch(e){}
  NAMES=await loadNames(lang);
  for(const x of THUMBS)x.zh=nameOf(x.dex);
  for(const x of BGCOMBOS)x.zh=nameOf(x.dex);
  for(const kk of ['want','have'])for(const c of LIST[kk])c.zh=nameOf(c.dex);
  for(const t of TEXTS){ if(t.edited)continue;   // 未手動改過的預設文字 → 換語言
    if(t.id==='lab-want')t.text='🟢 '+tr('want');
    else if(t.id==='lab-have')t.text='🟡 '+tr('have'); }
  applyStaticI18n();
  render(); drawLists(); if($('#baseCv').width)renderBase();
}

    b.style.background=THEMES[k].ui.bg; b.title=tr(ik); b.dataset.k=k;
    if(k===THEME)b.classList.add('on'); b.onclick=()=>applyTheme(k); box.appendChild(b); }
}
function applyTheme(k){
  if(!THEMES[k])k='neon'; THEME=k; $('#themeSel').value=k;
  document.querySelectorAll('#edThemes button').forEach(b=>b.classList.toggle('on',b.dataset.k===k));
  const u=THEMES[k].ui,R=document.documentElement.style;
  const map={'--bg':u.bg,'--card':u.card,'--line':u.line,'--fg':u.fg,'--mut':u.mut,'--acc':u.acc,'--acc2':u.acc2,'--want':u.want,'--have':u.have,'--cellbg':u.cellbg};
  for(const p in map) R.setProperty(p,map[p]);
  localStorage.setItem('bgtoolTheme',k);
  // 主題色套到「未被手動改色」的預設文字
  const T=THEMES[k].exp;
  for(const t of TEXTS){ if(t.autoColor){ if(t.id==='title')t.color=T.title; else if(t.id==='canfly')t.color=T.fly; else if(t.id==='lab-want')t.color=T.sec1; else if(t.id==='lab-have')t.color=T.sec2; else if(t.id==='foot')t.color=T.foot; } }
  renderBase();
}

/* ---------- 版面計算(卡片固定,文字浮動) ---------- */
const PAD=40,S=164,GAP=16,NOTELH=30;   // NOTELH=備註每行高度
let COLS=5, LAYW=2*PAD+GAP+COLS*(S+GAP);   // 於 boot 依裝置寬度設定:桌機每排更多、手機維持 5
const COLS_MIN=1, COLS_MAX=15;
function setCols(){   // 優先用使用者存過的每排數量;沒有才依裝置寬度給預設
  const saved=+localStorage.getItem('bgtoolCols');
  COLS = (saved>=COLS_MIN&&saved<=COLS_MAX) ? saved : (window.innerWidth>=1100?8 : window.innerWidth>=880?7 : 5);
  LAYW=2*PAD+GAP+COLS*(S+GAP);
}
function updateColsUI(){ const v=$('#colsVal'); if(v)v.textContent=COLS;
  const m=$('#colsMinus'),p=$('#colsPlus'); if(m)m.disabled=COLS<=COLS_MIN; if(p)p.disabled=COLS>=COLS_MAX; }
// 編輯圖片時調整每排幾隻:改 COLS→重算版面寬度,並把文字水平位置等比例縮放以維持相對位置
function setColsExport(n){
  n=Math.max(COLS_MIN,Math.min(COLS_MAX,Math.round(n))); if(n===COLS){ updateColsUI(); return; }
  const oldW=LAYW; COLS=n; LAYW=2*PAD+GAP+COLS*(S+GAP);
  const r=LAYW/oldW; for(const t of TEXTS) t.cx*=r;
  try{ localStorage.setItem('bgtoolCols',COLS); }catch(e){}
  updateColsUI(); renderBase();
}
function rowsOf(n){return Math.max(1,Math.ceil(n/COLS));}
function computeLayout(){
  const fly=$('#canfly').checked;
  const secs=[{key:'want',items:LIST.want,col:THEMES[THEME].exp.sec1,def:'🟢 '+tr('want')},
              {key:'have',items:LIST.have,col:THEMES[THEME].exp.sec2,def:'🟡 '+tr('have')}].filter(s=>s.items.length);
  let top=140+(fly?46:0);
  let y=top; const S2=[];
  for(const s of secs){
    const nrows=rowsOf(s.items.length), rows=[]; let yoff=0;
    for(let r=0;r<nrows;r++){   // 每排的備註高度只看「這一排」有沒有備註 → 沒備註的排不會被撐開
      let lines=0;
      for(let c=0;c<COLS;c++){ const it=s.items[r*COLS+c]; if(it&&it.note) lines=Math.max(lines,String(it.note).split('\n').length); }
      const nh = lines ? lines*NOTELH+6 : 0;
      rows.push({y:yoff, noteH:nh}); yoff += S+nh+GAP;
    }
    const ph=yoff+GAP;
    S2.push({...s,labelY:y,panelY:y+58,ph,rows}); y=y+58+ph+30;
  }
  const H=Math.max(y+50,240);
  return {fly,secs:S2,H,top};
}

  for(const s of lay.secs) list.push({id:'lab-'+s.key,text:s.def,align:'left',cx:PAD,y:s.labelY,size:46,color:s.col,weight:900,font:DEFONT,outline:false,autoColor:true});

function reconcile(lay){
  if(!TEXTS.length){ TEXTS=defaultTexts(lay); return; }
  const byId=id=>TEXTS.find(t=>t.id===id);
  const def=defaultTexts(lay);
  // 標題一定存在
  if(!byId('title')) TEXTS.push(def.find(d=>d.id==='title'));
  // canfly 依開關
  if(lay.fly && !byId('canfly')) TEXTS.push(def.find(d=>d.id==='canfly'));
  if(!lay.fly) TEXTS=TEXTS.filter(t=>t.id!=='canfly');
  // 區塊標籤:有該區才有,沒手動移動就跟著版面
  for(const key of ['want','have']){
    const has=lay.secs.some(s=>s.key===key);
    let el=byId('lab-'+key);
    if(has && !el){ TEXTS.push(def.find(d=>d.id==='lab-'+key)); }
    else if(!has && el){ TEXTS=TEXTS.filter(t=>t!==el); }
    else if(has && el && !el.moved){ el.y=lay.secs.find(s=>s.key===key).labelY; }
  }
}

/* ---------- 畫底圖(漸層+面板+卡片,不含文字) ---------- */
const _imgCache=new Map();   // url→Promise<Image|null>,避免每次匯出都重新下載/解碼
function loadImg(s){
  if(!s) return Promise.resolve(null);
  const key=cdn(s);
  if(_imgCache.has(key)) return _imgCache.get(key);
  const p=new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.referrerPolicy='no-referrer';
    i.onload=()=>r(i); i.onerror=()=>{_imgCache.delete(key);r(null);}; i.src=key;});
  _imgCache.set(key,p); return p;
}
// 匯出用中尺寸背卡縮圖(~384px webp,原圖背卡動輒 500KB+);縮圖缺失時自動退回原圖
function expOf(u){ return (u&&u.startsWith('assets/bg/')) ? 'assets/bgexp/'+u.slice(10).replace(/\.(png|jpe?g|webp)$/i,'.webp') : u; }
function loadExport(u){ const e=expOf(u); if(e===u) return loadImg(u); return loadImg(e).then(im=>im||loadImg(u)); }
// 網格/清單用小縮圖(WebP)加速;匯出仍用原圖高解析。皆走 cdn()。
function thumbOf(u){ if(!u)return u;
  if(u.startsWith('assets/img/'))return cdn('assets/thumb/'+u.slice(11).replace(/\.png$/i,'.webp'));
  if(u.startsWith('assets/bg/'))return cdn('assets/bgthumb/'+u.slice(10).replace(/\.(png|jpe?g|webp)$/i,'.webp'));
  return u; }
function rrPath(x,rx,ry,w,h,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+w,ry,rx+w,ry+h,r);x.arcTo(rx+w,ry+h,rx,ry+h,r);x.arcTo(rx,ry+h,rx,ry,r);x.arcTo(rx,ry,rx+w,ry,r);x.closePath();}
// 自動去透明邊:很多寶可夢 icon 圖檔四周有一圈透明 padding,主體只佔中央。
// 掃描出不透明範圍的 bounding box(以比例 0~1 快取),繪製時只取主體 → 寶可夢顯示更大。
const _bboxCache=new Map(); let _trimCv=null;
const MAXUP=2.4;   // 去邊後最大放大倍率(相對來源主體像素):太小的主體不硬撐到填滿,避免放大到模糊
function trimBBox(img,key){
  if(_bboxCache.has(key)) return _bboxCache.get(key);
  let box=null;
  try{
    const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
    if(!iw||!ih) return null;   // 尚未載入完成,先不快取
    const scale=Math.min(1,96/Math.max(iw,ih));                 // 縮到 ~96px 掃描即可,加速
    const w=Math.max(1,Math.round(iw*scale)), h=Math.max(1,Math.round(ih*scale));
    const cv=_trimCv||(_trimCv=document.createElement('canvas'));
    cv.width=w; cv.height=h; const cx=cv.getContext('2d',{willReadFrequently:true});
    cx.clearRect(0,0,w,h); cx.drawImage(img,0,0,w,h);
    const d=cx.getImageData(0,0,w,h).data;
    let minX=w,minY=h,maxX=-1,maxY=-1;
    for(let y=0;y<h;y++)for(let xx=0;xx<w;xx++){ if(d[(y*w+xx)*4+3]>16){
      if(xx<minX)minX=xx; if(xx>maxX)maxX=xx; if(y<minY)minY=y; if(y>maxY)maxY=y; } }
    if(maxX>=minX && maxY>=minY) box={x:minX/w, y:minY/h, w:(maxX-minX+1)/w, h:(maxY-minY+1)/h};
  }catch(e){ box=null; }   // 跨域無 CORS 等讀不到像素 → 不裁,退回整張圖
  _bboxCache.set(key,box); return box;
}
// 把(去邊後的)寶可夢等比例置中畫進卡片內的正方框
function drawMon(x,m,key,dx0,dy0,box){
  x.imageSmoothingEnabled=true; x.imageSmoothingQuality='high';
  const bb=trimBBox(m,key);
  if(!bb){ x.drawImage(m,dx0,dy0,box,box); return; }
  const iw=m.naturalWidth||m.width, ih=m.naturalHeight||m.height;
  const sx=bb.x*iw, sy=bb.y*ih, sw=bb.w*iw, sh=bb.h*ih;
  const SC=(x.getTransform&&x.getTransform().a)||1;            // 目前整體縮放(匯出解析度)
  // contain,但放大不超過來源主體像素的 MAXUP 倍(小主體就不硬撐到填滿,置中即可)→ 不模糊
  const sc=Math.min(box/sw, box/sh, MAXUP/SC), dw=sw*sc, dh=sh*sc;
  x.drawImage(m, sx,sy,sw,sh, dx0+(box-dw)/2, dy0+(box-dh)/2, dw, dh);
}
// 預覽(選取格子/清單)的 <img> 也去透明邊:量出主體範圍後,用 transform 放大並置中,
// 超出的透明邊由容器 overflow:hidden 裁掉,與下載圖效果一致。pad=主體佔卡片的比例。
function hookTrim(img,hasBg){
  const run=()=>{
    if(!img.naturalWidth) return;
    const bb=trimBBox(img,img.src); if(!bb) return;   // 讀不到(跨域無 CORS 等)→ 維持原樣
    img.style.width='100%'; img.style.height='100%';
    const pad=hasBg?0.84:0.96;
    const L=img.clientWidth||img.offsetWidth||72, dpr=window.devicePixelRatio||1;
    // 放大不超過來源(縮圖)主體像素的 MAXUP 倍 → 小主體不會被放大到模糊(改為置中、較小但清晰)
    const sMax=MAXUP*img.naturalWidth/Math.max(1,L*dpr);
    const s=Math.min(pad/Math.max(bb.w,bb.h), sMax);
    const tx=-((bb.x+bb.w/2)-0.5)*s*100, ty=-((bb.y+bb.h/2)-0.5)*s*100;
    img.style.transform=`translate(${tx}%,${ty}%) scale(${s})`;
  };
  if(img.complete && img.naturalWidth) run(); else img.addEventListener('load',run,{once:true});
}
function star(x,cx,cy,r,fill){x.beginPath();for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,rr_=i%2?r*0.45:r;x[i?'lineTo':'moveTo'](cx+rr_*Math.cos(a),cy+rr_*Math.sin(a));}x.closePath();x.fillStyle=fill;x.fill();}
async function drawCard(x,cx,cy,c,T,noteH,noteCol){
  x.save();x.shadowColor='rgba(0,0,0,0.35)';x.shadowBlur=8;x.shadowOffsetY=3;x.fillStyle=T.cardbg;rrPath(x,cx,cy,S,S,S*0.16);x.fill();x.restore();
  x.save();rrPath(x,cx,cy,S,S,S*0.16);x.clip();x.fillStyle=T.cardbg;x.fillRect(cx,cy,S,S);
  if(c.bg){const b=await loadExport(c.bg);if(b)x.drawImage(b,cx,cy,S,S);}

function scaleFor(H){ const MAX = window.innerWidth<700 ? 5e6 : 14e6;   // 手機記憶體較緊,面積上限壓低避免拖曳時被回收成空白
  return Math.min(2, Math.sqrt(MAX/(LAYW*Math.max(H,1)))); }

function scaleForExport(H){
  const mob = window.innerWidth<700 || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const MAXAREA = mob ? 1.6e7 : 6e7;     // 面積上限:手機≈iOS 16M px 內, 桌機更寬鬆
  const MAXSIDE = mob ? 8192  : 16384;   // 單邊像素上限

/* ===== 分塊 PNG 編碼:繞過手機 canvas 單邊/面積上限,產生大而清晰的圖 =====

const _crcTable=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();

async function downloadPNG(){
  if(!LIST.want.length&&!LIST.have.length){alert(tr('list_empty'));return;}
  const lay=computeLayout(); reconcile(lay);
  const total=LIST.want.length+LIST.have.length;
  const cv=$('#cv');
  // 大清單/高圖:改用「分塊編碼 PNG」避開 iOS canvas 上限造成的降採樣模糊(需瀏覽器支援 CompressionStream)
  const canTile = typeof CompressionStream!=='undefined';
  if(canTile && (total>100 || lay.H>3600)){
    let SC=scaleForExport(lay.H);
    // 分塊已不受單邊上限限制,只需控制記憶體:RGBA buffer ≈ W*H*4 bytes,把它壓在約 1.6 億 bytes(~160MB)內

    SC=Math.max(0.6,Math.min(3,SC));

      await saveBlob(blob, tr('fname')+'.png');
      return;
    }catch(e){ console.warn('分塊輸出失敗,改用一般方式', e); /* 落到下面的一般流程 */ }
  }

  let SC=scaleForExport(lay.H), x=cv.getContext('2d');

    cv.width=Math.round(LAYW*SC); cv.height=Math.round(lay.H*SC); x=cv.getContext('2d');
    if(sharpEnough(x,cv.width,cv.height)) break;
    if(SC<=0.4) break;

  await drawBaseTo(x,lay,SC); drawTextsTo(x,SC,0);
  await saveCanvas(cv, tr('fname')+'.png');

async function saveBlob(blob, name){
  // 保留 Safari 原本的「下載 / 檢視」選單:用 Blob URL(短參照),Safari「檢視」才正常
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 120000);   // 留時間給「檢視/下載」使用,之後才釋放
}
async function saveCanvas(cv, name){
  const blob = await new Promise(res=>{ if(cv.toBlob) cv.toBlob(res,'image/png'); else res(null); });
  if(blob){ await saveBlob(blob, name); return; }
  const a=document.createElement('a'); a.download=name; a.href=cv.toDataURL('image/png'); a.click();   // 舊瀏覽器後備
}

function baseVar(p,shiny){return p.variants.find(v=>!!v.shiny===shiny&&!v.form&&!v.costume&&!v.gender)||p.variants.find(v=>!!v.shiny===shiny)||null;}
function buildThumbs(){
  THUMBS=[];BGCOMBOS=[];
  for(const p of Object.values(POKE)){
    for(const v of p.variants) THUMBS.push({url:v.url,dex:p.id,zh:nameOf(p.id),shiny:v.shiny,gender:v.gender,badge:null,tag:'',cos:!!(v.form||v.costume)});
    if(p.gigantamax){
      if(p.gigantamax.normal)THUMBS.push({url:p.gigantamax.normal,dex:p.id,zh:nameOf(p.id),shiny:false,badge:badgeG,tag:'超極巨化',gmax:true});
      if(p.gigantamax.shiny)THUMBS.push({url:p.gigantamax.shiny,dex:p.id,zh:nameOf(p.id),shiny:true,badge:badgeG,tag:'超極巨化',gmax:true});
    }
    if(p.dynamax_capable){
      const n=baseVar(p,false),s=baseVar(p,true);
      if(n)THUMBS.push({url:n.url,dex:p.id,zh:nameOf(p.id),shiny:false,badge:badgeD,tag:'極巨化',dmax:true});
      if(s)THUMBS.push({url:s.url,dex:p.id,zh:nameOf(p.id),shiny:true,badge:badgeD,tag:'極巨化',dmax:true});
    }
  }
  for(const b of BG){
    if(!b.image_url)continue;
    for(const mon of b.pokemon){
      const dex=mon.dex, p=POKE[dex]; if(!p)continue;
      const vn=baseVar(p,false), vs=baseVar(p,true);
      const add=(url,shiny,badge,tag,gm)=>{ if(url)BGCOMBOS.push({url,bg:b.image_url,dex,zh:nameOf(p.id),bgname:b.image_name,badge:badge||null,shiny:!!shiny,tag:tag||'',dmax:tag==='極巨化',gmax:!!gm,purified:tag==='淨化'}); };
      if(mon.gmax){ if(p.gigantamax){ add(p.gigantamax.normal,false,badgeG,'超極巨化',true); if(mon.shiny) add(p.gigantamax.shiny,true,badgeG,'超極巨化',true);} }
      else if(mon.dynamax){ add(vn&&vn.url,false,badgeD,'極巨化'); if(mon.shiny) add(vs&&vs.url,true,badgeD,'極巨化'); }
      else if(mon.shadow){ add(vn&&vn.url,false,badgeP,'淨化'); if(mon.shiny) add(vs&&vs.url,true,badgeP,'淨化'); }
      else { add(vn&&vn.url,false,null,''); if(mon.shiny) add(vs&&vs.url,true,null,''); }
    }
  }
  for(const t of THUMBS) t.legendary=!!(POKE[t.dex]&&POKE[t.dex].legendary);
  for(const c of BGCOMBOS) c.legendary=!!(POKE[c.dex]&&POKE[c.dex].legendary);
}

// 只預載「已渲染之後的接下來一段」(不是全部),首屏最快,滾動時再往前補
const AHEAD=360;                          // 預先暖快取的張數(約接下來幾屏)
let preloadToken=0;
function preloadAhead(){
  const my=++preloadToken;                // 換篩選/滾動就取消上一輪
  const start=shown, end=Math.min(shown+AHEAD, FILTERED.length);
  const urls=[]; for(let k=start;k<end;k++){ const it=FILTERED[k]; if(!it)continue; urls.push(thumbOf(it.url)); if(it.bg)urls.push(thumbOf(it.bg)); }
  let i=0, active=0; const MAX=6;
  function pump(){
    if(my!==preloadToken) return;
    while(active<MAX && i<urls.length){
      const u=urls[i++]; if(!u)continue;
      active++; const im=new Image(); im.referrerPolicy='no-referrer';
      im.onload=im.onerror=()=>{ active--; if(my===preloadToken) pump(); };
      im.src=u;
    }
  }
  pump();
}
function appendBatch(){
  const g=$('#grid');const end=Math.min(shown+300,FILTERED.length);
  for(let i=shown;i<end;i++){
    const it=FILTERED[i];const d=document.createElement('div');d.className='cell';
    if(inTarget(it))d.classList.add('added');
    d.innerHTML=`${it.bg?`<img class="cbg" loading="lazy" decoding="async" referrerpolicy="no-referrer" src="${thumbOf(it.bg)}">`:''}
      <img class="m${it.bg?'':' big'}" crossorigin="anonymous" loading="lazy" decoding="async" src="${thumbOf(it.url)}">${it.badge?`<img class="bd" src="${cdn(it.badge)}">`:''}
      ${it.shiny?'<span class="sh">✨</span>':''}${it.gender==='female'?'<span class="gn">♀</span>':''}${it.gender==='male'?'<span class="gn" style="color:#8fc7ff">♂</span>':''}${inTarget(it)?'<span class="ok">✓</span>':''}`;
    d.title=(it.zh||'')+(it.tag?'('+it.tag+')':'')+(it.bgname?' + '+it.bgname:'')+(it.shiny?' 異色':'');
    d._it=it;   // 存參照,切換目標時可原地更新✓而不必重建網格(避免圖片重載)
    bindCellTap(d,it);
    g.appendChild(d);
    const mi=d.querySelector('img.m'); if(mi)hookTrim(mi,!!it.bg);   // 預覽也去透明邊(需已在 DOM 才量得到寬度)
  }
  shown=end;
  preloadAhead();   // 暖快取:接下來一段的縮圖
}

const suid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function newSetData(){ return {want:[],have:[],canfly:false,qr:true}; }
function normSetData(d){ return {
  want:Array.isArray(d&&d.want)?d.want:[], have:Array.isArray(d&&d.have)?d.have:[],
  canfly:!!(d&&d.canfly), qr:!(d&&d.qr===false) }; }
function setDefaultName(){ const taken=new Set(SETS.map(s=>s.name)); let n=1;
  while(taken.has(tr('set_default')+' '+n)) n++; return tr('set_default')+' '+n; }
function uniqueSetName(base){ const taken=new Set(SETS.map(s=>s.name));
  if(!taken.has(base)) return base; let i=2; while(taken.has(base+' '+i)) i++; return base+' '+i; }

function migrate(d){
  if(!d) return null;
  if(Array.isArray(d.sets)&&d.sets.length)
    return {sets:d.sets.map(s=>({id:s.id||suid(), name:s.name||tr('set_default'), data:normSetData(s.data)})), activeId:d.activeId};
  if(Array.isArray(d.want)||Array.isArray(d.have))
    return {sets:[{id:suid(), name:tr('set_default')+' 1', data:normSetData(d)}], activeId:null};
  return null;
}
function adoptSets(m){

  SETS=m.sets;
  activeSetId=(m.activeId&&SETS.some(s=>s.id===m.activeId))?m.activeId:SETS[0].id;
  bindActiveSet(); return true;
}

function moveSetTo(id,to){ const from=SETS.findIndex(s=>s.id===id); if(from<0)return;
  const [m]=SETS.splice(from,1); if(to>from)to--;
  SETS.splice(Math.max(0,Math.min(to,SETS.length)),0,m); setDragId=null; persist(); renderSets(); }
function renderSets(){
  const bar=$('#setbar'); if(!bar) return; bar.innerHTML='';
  SETS.forEach((s,idx)=>{
    const chip=document.createElement('div'); chip.className='setchip'+(s.id===activeSetId?' on':'');

    chip.ondragstart=e=>{ setDragId=s.id; chip.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; };
    chip.ondragend=()=>{ setDragId=null; clearSetIns();
      document.querySelectorAll('.setchip.dragging').forEach(x=>x.classList.remove('dragging')); };
    chip.ondragover=e=>{ if(!setDragId||setDragId===s.id)return; e.preventDefault();
      const r=chip.getBoundingClientRect(), after=(e.clientX-r.left)>r.width/2;
      clearSetIns(); chip.classList.add(after?'insa':'insb'); };
    chip.ondrop=e=>{ if(!setDragId||setDragId===s.id)return; e.preventDefault(); e.stopPropagation();
      const r=chip.getBoundingClientRect(), after=(e.clientX-r.left)>r.width/2;
      clearSetIns(); moveSetTo(setDragId, idx+(after?1:0)); };
    chip.appendChild(nm); chip.appendChild(ct); bar.appendChild(chip);
  });
  bar.ondragover=e=>{ if(setDragId)e.preventDefault(); };
  bar.ondrop=e=>{ if(setDragId&&e.target===bar){ e.preventDefault(); clearSetIns(); moveSetTo(setDragId,SETS.length); } };
}
// 觸控:改用 pointer 事件即時反應。click 在手機上有延遲、快速連點會掉點,
// 兩指同時各點一隻還會被當成夾捏縮放而完全不觸發 → 改用 pointerdown/up,每個觸點各自獨立。
// 手指按下即先標記,放開(未滑動)才確定選取;滑動捲動時瀏覽器會發 pointercancel,自動取消。
function bindCellTap(d,it){
  let sx=0,sy=0,moved=false,active=false;
  d.addEventListener('pointerdown',e=>{ if(e.pointerType==='mouse'&&e.button!==0)return;
    active=true; moved=false; sx=e.clientX; sy=e.clientY; });
  d.addEventListener('pointermove',e=>{ if(active&&(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10))moved=true; });
  d.addEventListener('pointerup',e=>{ if(!active)return; active=false; if(!moved)toggleItem(it,d); });
  d.addEventListener('pointercancel',()=>{ active=false; });
}
// 連點時把「重畫清單/匯出預覽/重新篩選」延後合併:點選即時反應(格子的✓當下就更新)、
// 不因每次點擊都重畫而卡頓或掉點。這些重畫在選取浮層開啟時本來就看不到,關閉時 flush 一次即可。
let _toggleSyncTimer=null;
function runToggleSync(){ _toggleSyncTimer=null;
  // 選取浮層開啟中:清單與匯出預覽都在浮層後面看不到 → 只做輕量存檔,
  // 完全略過 drawLists()/renderBase() 這種重畫,避免背景繪製造成手機卡頓。
  if(document.body.classList.contains('picking')){ if(FILT.fSelected)render(); persist(); return; }
  drawLists(); if(FILT.fSelected)render(); renderBase();
}
function scheduleToggleSync(){ clearTimeout(_toggleSyncTimer); _toggleSyncTimer=setTimeout(runToggleSync,180); }
// 關閉浮層時務必做一次完整重畫(此時 picking 已移除,runToggleSync 會走完整路徑),
// 不論當下是否還有待處理的 timer,確保清單與匯出預覽反映所有選取。
function flushToggleSync(){ clearTimeout(_toggleSyncTimer); _toggleSyncTimer=null; runToggleSync(); }
function toggleItem(it,cell){
  const c={url:it.url,badge:it.badge||null,zh:it.zh,shiny:!!it.shiny,tag:it.tag||'',bg:it.bg||null,gender:it.gender||null,dex:it.dex};
  const arr=LIST[TARGET];const idx=arr.findIndex(x=>keyOf(x)===keyOf(c));
  if(idx>=0){arr.splice(idx,1);cell&&cell.classList.remove('added');cell&&cell.querySelector('.ok')?.remove();}
  else{arr.push(c);if(cell){cell.classList.add('added');if(!cell.querySelector('.ok')){const s=document.createElement('span');s.className='ok';s.textContent='✓';cell.appendChild(s);}}
    loadImg(c.url); if(c.bg)loadExport(c.bg); if(c.badge)loadImg(c.badge);}   // 加入時就先把匯出用圖抓進快取,之後製圖免等
  scheduleToggleSync();
}
function clearIns(){document.querySelectorAll('.li.insb,.li.insa').forEach(x=>x.classList.remove('insb','insa'));}
// 匯出預覽(canvas)重畫很重(清單很多時要畫上百張卡片)→ 合併延後,避免刪除/打字時每次都重畫造成卡頓
let _baseTimer=null;
function scheduleBase(){ clearTimeout(_baseTimer); _baseTimer=setTimeout(()=>{ _baseTimer=null; renderBase(); },160); }
// 拖曳排序:只在陣列裡搬一項,並在 DOM 只移動「那一個節點」(不重建整個清單),canvas 重畫延後合併 → 300+ 隻也不卡
function moveItem(k,from,to,node,ref){
  const arr=LIST[k];const[mv]=arr.splice(from,1);if(to>from)to--;arr.splice(to,0,mv);
  if(node&&node.parentNode){ if(ref!==node) node.parentNode.insertBefore(node,ref); persist(); scheduleBase(); }
  else { drawLists(); renderBase(); }   // 無節點資訊時退回完整重建(相容其他呼叫)
}
function clearSide(k){ if(!LIST[k].length)return; if(!confirm(tr('confirm_clear')))return; LIST[k]=[]; drawLists(); render(); renderBase(); }
function noteGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,64)+'px'; }
// pointer-based 清單拖曳排序:桌機移動即拖;手機長按 200ms 才拖(拖之前可正常捲動)。
let liDragActive=false;
document.addEventListener('touchmove',e=>{ if(liDragActive && e.cancelable) e.preventDefault(); },{passive:false});
function liDrag(d,k,i){
  d.addEventListener('pointerdown',e=>{
    if(e.target.closest('.note')||e.target.closest('.del')) return;
    const sx=e.clientX,sy=e.clientY,touch=e.pointerType==='touch'; let active=false,hold=null;
    const begin=()=>{ active=true; liDragActive=true; dragK=k; dragIdx=i; d.classList.add('dragging'); try{d.setPointerCapture(e.pointerId);}catch(_){} };
    if(touch) hold=setTimeout(begin,200);
    const move=ev=>{
      if(!active){ const far=Math.hypot(ev.clientX-sx,ev.clientY-sy)>10;
        if(far){ if(touch){ clearTimeout(hold); cleanup(); return; } begin(); } else return; }
      if(ev.cancelable)ev.preventDefault();
      const el=document.elementFromPoint(ev.clientX,ev.clientY),li=el&&el.closest('.li'); clearIns();
      if(li&&li!==d&&li.parentNode===d.parentNode){ const r=li.getBoundingClientRect();
        li.classList.add((ev.clientX-r.left)>r.width/2?'insa':'insb'); } };
    const up=ev=>{
      if(active){ const el=document.elementFromPoint(ev.clientX,ev.clientY),li=el&&el.closest('.li');
        clearIns(); d.classList.remove('dragging');
        if(li&&li.parentNode===d.parentNode){ const kids=[...d.parentNode.children],
          from=kids.indexOf(d), idx=kids.indexOf(li),
          r=li.getBoundingClientRect(),after=(ev.clientX-r.left)>r.width/2,
          ref=after?li.nextSibling:li; moveItem(k,from,after?idx+1:idx,d,ref); } }
      cleanup(); };
    function cleanup(){ clearTimeout(hold); liDragActive=false; dragK=null; dragIdx=null;
      d.removeEventListener('pointermove',move); d.removeEventListener('pointerup',up); d.removeEventListener('pointercancel',up); }
    d.addEventListener('pointermove',move); d.addEventListener('pointerup',up); d.addEventListener('pointercancel',up);
  });
}
function drawLists(){
  for(const [k,el,cnt] of [['want','#listW','#cW'],['have','#listH','#cH']]){
    const box=$(el);$(cnt).textContent=LIST[k].length;
    if(!LIST[k].length){box.innerHTML='<div class="empty">'+tr('empty')+'</div>';continue;}
    box.innerHTML='';
    LIST[k].forEach((c,i)=>{const d=document.createElement('div');d.className='li';
      d.innerHTML=`<div class="card">${c.bg?`<img class="bg" loading="lazy" decoding="async" src="${thumbOf(c.bg)}" referrerpolicy="no-referrer">`:''}
        <img class="m${c.bg?'':' big'}" crossorigin="anonymous" loading="lazy" decoding="async" src="${cdn(c.url)}">${c.badge?`<img class="bd" src="${cdn(c.badge)}">`:''}
        ${c.shiny?'<span class="sh">✨</span>':''}${c.gender==='female'?'<span class="gn">♀</span>':''}${c.gender==='male'?'<span class="gn" style="color:#8fc7ff">♂</span>':''}
        <button class="del">✕</button></div>`;
      // 每張卡片的附加文字（顯示在匯出圖上）
      const ni=document.createElement('textarea');ni.className='note'+(c.note?' has':'');ni.maxLength=40;ni.rows=1;ni.placeholder=tr('note_ph');ni.value=c.note||'';
      ni.oninput=()=>{ c.note=ni.value; ni.classList.toggle('has',!!ni.value); noteGrow(ni); scheduleBase(); persist(); };
      ni.onpointerdown=e=>e.stopPropagation();   // 點備註不觸發拖曳
      requestAnimationFrame(()=>noteGrow(ni));   // 依內容自動長高(多行)
      const del=d.querySelector('.del'); del.onpointerdown=e=>e.stopPropagation();
      // 刪除:只移除這一個節點 + 更新數字,canvas 重畫延後合併 → 400 隻時也不卡
      del.onclick=e=>{ e.stopPropagation();
        const idx=LIST[k].indexOf(c); if(idx<0)return;
        LIST[k].splice(idx,1); d.remove();
        $(cnt).textContent=LIST[k].length;
        if(!LIST[k].length) box.innerHTML='<div class="empty">'+tr('empty')+'</div>';
        renderSets(); persist(); scheduleBase(); };
      liDrag(d,k,i);
      d.appendChild(ni);
      box.appendChild(d);
      const mi=d.querySelector('.m'); if(mi)hookTrim(mi,!!c.bg);   // 預覽也去透明邊(需已在 DOM 才量得到寬度)
    });
  }
  persist();
  renderSets();   // 更新清單膠囊上的數量
}

/* ===== 清單記錄:登入→雲端(Firebase Realtime DB),未登入→localStorage ===== */
const LS_KEY='tradeListData';
let AUTHUSER=null, cloudUid=null, cloudSave=null, ready=false, saveTimer=null;
let bootResolve; const bootReady=new Promise(r=>{bootResolve=r;});   // boot 完成(本機清單已還原)後 resolve
function collect(){
  // 勾選框的即時狀態同步回目前這組,再整包存(v2:多組)
  if($('#canfly')) LIST.canfly=$('#canfly').checked;
  return {v:2, sets:SETS, activeId:activeSetId};
}
function persist(){
  if(!ready) return;
  const data=collect();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(data)); }catch(e){}
  if(cloudUid && cloudSave){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>cloudSave(data), 700); }
}
function applyData(d){
  if(!adoptSets(migrate(d))) return;   // 支援新舊格式(舊的單一清單會自動轉成一組)
  renderSets(); drawLists(); render(); renderBase();
}
function updateAuthUI(user){
  AUTHUSER=user; const b=$('#authBtn'), m=$('#cloudMsg'); if(!b) return;
  if(user){ b.textContent=tr('auth_logout'); b.classList.add('signedin'); b.onclick=()=>window.__tlAuth&&window.__tlAuth.signOut();
    if(m) m.textContent=(user.displayName||user.email||'')+' · '+tr('auth_synced'); }
  else{ b.textContent=tr('auth_login'); b.classList.remove('signedin'); b.onclick=()=>window.__tlAuth&&window.__tlAuth.signIn();
    if(m) m.textContent=tr('auth_guest'); }
}
// 給 Firebase 模組(另一支 type=module 腳本)呼叫的橋接
window.__TL={
  applyData, collect, updateAuthUI, ready:bootReady,
  setCloudSave(fn){ cloudSave=fn; },
  setCloudUid(u){ cloudUid=u; if(u) persist(); }   // 登入後把目前清單立即同步一次
};
boot();
</script>

<!-- Firebase 登入 + 雲端清單同步(沿用主站 config.js / Realtime Database)。ES module,透過 window.__TL 與上面的主腳本溝通。 -->
<script src="../config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
  const TL = () => window.__TL;
  if(window.firebaseConfig){
    const app = initializeApp(window.firebaseConfig);
    const auth = getAuth(app), db = getDatabase(app), provider = new GoogleAuthProvider();
    const path = uid => `users/${uid}/tradeList`;
    // 提供給主腳本按鈕使用的登入/登出
    window.__tlAuth = {
      signIn(){ signInWithPopup(auth, provider).catch(e=>{ console.error(e); alert('登入失敗:'+(e.message||e)); }); },
      signOut(){ signOut(auth); }
    };
    // 雲端存檔器交給主腳本(每次清單變動且已登入時會呼叫)
    const saver = async (data) => { const u = auth.currentUser; if(!u) return;
      try{ await set(ref(db, path(u.uid)), data); }catch(e){ console.error('雲端儲存失敗', e); } };
    if(TL()) TL().setCloudSave(saver);
    onAuthStateChanged(auth, async (user) => {
      const tl = TL(); if(!tl) return;
      await tl.ready;                                   // 等 boot 完成、本機清單已還原,雲端才覆蓋
      tl.updateAuthUI(user);
      if(user){
        try{
          const snap = await get(ref(db, path(user.uid)));
          if(snap.exists()) tl.applyData(snap.val());   // 雲端有→覆蓋本機顯示
          else saver(tl.collect());                     // 雲端還沒有→把目前本機清單上傳
        }catch(e){ console.error('讀取雲端清單失敗', e); }
        tl.setCloudUid(user.uid);                        // 之後的變動都寫雲端
      }else{
        tl.setCloudUid(null);
      }
    });
  }else{
    console.warn('找不到 window.firebaseConfig,交易清單的登入/雲端同步已停用(本機暫存仍可用)。');
  }
</script>
</body>
